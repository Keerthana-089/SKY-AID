<!DOCTYPE html>
<html>
<head>
  <title>Login - Sky Aid</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      text-align: center;
      background: url('bg1.png') no-repeat center center fixed;
      background-size: cover;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    .container {
      margin: 120px auto;
      max-width: 400px;
      padding: 50px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.5);
      animation: fadeIn 1.5s ease;
    }

    .logo {
      width: 75px;
      height: 75px;
      margin-bottom: 20px;
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(255,255,255,0.3);
      transition: transform 0.6s ease;
    }

    .logo:hover {
      transform: rotate(360deg);
    }

    h2 {
      font-size: 36px;
      margin-bottom: 30px;
      color: #fff;
      text-shadow: 2px 2px 6px rgba(0,255,255,0.5);
    }

    input[type="text"],
    input[type="number"] {
      width: 85%;
      padding: 12px;
      margin: 12px 0;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      text-align: center;
      outline: none;
      transition: 0.3s;
      color: #000;
      background: #fff;
      box-shadow: 0 0 8px rgba(0,0,0,0.4);
    }

    input[type="text"]:focus,
    input[type="number"]:focus {
      box-shadow: 0 0 14px #00b4d8;
    }

    button {
      padding: 14px 30px;
      font-size: 18px;
      background: #00b4d8;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      margin-top: 20px;
      transition: background 0.3s ease, transform 0.2s ease;
      box-shadow: 0 4px 14px rgba(0,0,0,0.4);
      animation: pulse 2s infinite;
    }

    button:hover {
      background: #0077b6;
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0,180,216,0.5);
    }

    .footer {
      margin-top: 50px;
      font-size: 14px;
      color: #ccc;
      text-shadow: 0 0 5px rgba(0,0,0,0.6);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 14px rgba(0,180,216,0.4);}
      50% { transform: scale(1.05); box-shadow: 0 0 26px rgba(0,212,255,0.6);}
      100% { transform: scale(1); box-shadow: 0 0 14px rgba(0,180,216,0.4);}
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="logo.jpg" alt="Sky Aid Logo" class="logo">
    <h2>Login Details</h2>

    <input type="text" id="name" placeholder="Name"><br>
    <input type="number" id="mobile" placeholder="Mobile Number"><br>

    <button onclick="validateLogin()">Sign In</button>
  </div>

  <div class="footer">
    © 2025 Sky Aid • Designed by Keer 🚁
  </div>

  <script>
    function validateLogin() {
      const name = document.getElementById("name").value.trim();
      const mobile = document.getElementById("mobile").value.trim();

      if (name === "" || mobile === "") {
        alert("Please enter both Name and Mobile Number to proceed.");
      } else {
        location.href = 'permission.html';
      }
    }
  </script>

</body>
</html>
